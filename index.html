<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모모 디저트랩</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: #fff7f5;
  color: #333;
}

section {
  padding: 80px 20px;
}

/* 섹션 대비 강조 */
.header { background: linear-gradient(135deg,#ff8fa3,#ff6b81); color: white; text-align:center; }
.products-section { background: #ffffff; }
.cta-section { background: #111827; color: white; text-align:center; }

h1, h2, p { margin: 0 0 16px; }

.container {
  max-width: 1000px;
  margin: auto;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 24px;
}

/* 카드 입체감 강화 */
.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
  transition: all 0.3s ease;
  transform: translateY(40px);
  opacity: 0;
  animation: fadeUp 0.6s ease forwards;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 25px 50px rgba(0,0,0,0.18);
}

.card img {
  width: 100%;
  border-radius: 14px;
}

/* 순차 애니메이션 */
.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.4s; }
.card:nth-child(3) { animation-delay: 0.6s; }

@keyframes fadeUp {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* 버튼 인터랙션 강화 */
.btn {
  display: inline-block;
  padding: 14px 28px;
  background: linear-gradient(135deg,#ff8fa3,#ff6b81);
  color: white;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
}

.btn:hover {
  transform: translateY(-3px) scale(1.07);
  box-shadow: 0 12px 25px rgba(255,107,129,0.4);
}

.btn:active {
  transform: scale(0.95);
}

footer {
  background: #ffe5ec;
  text-align:center;
  padding: 30px;
}

</style>
</head>
<body>

<section class="header">
  <h1>모모 디저트랩</h1>
  <p>달콤함을 연구하는 디저트샵</p>
  <a href="#" class="btn">지금 주문하기</a>
</section>

<section class="products-section">
  <div class="container">
    <h2>대표 상품</h2>
    <div class="products">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587" alt="케이크">
        <h3>시그니처 생크림 케이크</h3>
        <p>부드러운 생크림과 촉촉한 시트</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1601979031925-424e53b6caaa" alt="마카롱">
        <h3>프리미엄 마카롱</h3>
        <p>다양한 맛의 달콤한 한입</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1505253716362-afaea1d3d1af" alt="디저트">
        <h3>수제 디저트</h3>
        <p>매일 신선하게 만드는 디저트</p>
      </div>

    </div>

    <div style="text-align:center; margin-top:40px;">
      <a href="#" class="btn">전체 메뉴 보기</a>
    </div>
  </div>
</section>

<section class="cta-section">
  <h2>지금 바로 경험해보세요</h2>
  <p>특별한 하루를 위한 달콤한 선택</p>
  <a href="#" class="btn">무료 체험</a>
</section>

<footer>
  <p>© 2026 모모 디저트랩</p>
</footer>

</body>
</html>
